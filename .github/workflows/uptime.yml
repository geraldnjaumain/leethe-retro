name: Production uptime

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check liveness
        run: curl --fail --retry 3 --retry-all-errors --retry-delay 5 --max-time 15 "${PRODUCTION_URL%/}/healthz"
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      - name: Check readiness
        run: curl --fail --retry 3 --retry-all-errors --retry-delay 5 --max-time 20 "${PRODUCTION_URL%/}/readyz?strict=1"
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
